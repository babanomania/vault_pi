[defaults]
su = False
deprecation_warnings = False
interpreter_python = auto_silent
inventory = ./inventory.ini

[ssh_connection]
# Force IPv4 — mDNS on the LAN can return a link-local IPv6 first,
# and UFW (deny incoming, v4+v6) drops the v6 reply path.
ssh_args = -4 -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=20
