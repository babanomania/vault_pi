---

# How to create encrypted passwords for the user module
# https://docs.ansible.com/ansible/latest/reference_appendices/faq.html#how-do-i-generate-encrypted-passwords-for-the-user-module
# The custom password for the pi user is in this example "raspberry"
pi_custom_password: $6$c04cOXDbcDZ$fobZpDfUp1gOfICS9B5MNmzr9BnNL8gzjPBZnfoYLG/VCYSXFChljrMgczA9WI.TdNXIHtSCVKEJ36suDK1s4/

base_path: /home/pi

# ---------------------------------------------------------------------------
# Feature flags
# ---------------------------------------------------------------------------
ensure_backup: True
ensure_autoupdate: True
ensure_display: True

# ---------------------------------------------------------------------------
# TLS / hostname
# ---------------------------------------------------------------------------
# tls_provider:
#   tailscale    -> Tailscale-issued Let's Encrypt (REQUIRED for the
#                   official Bitwarden iOS app — Apple's URLSession
#                   refuses user-installed CAs in security-sensitive apps).
#   self_signed  -> Root CA + leaf. Works for browsers and most desktop
#                   clients once you install ca.crt and trust it. Bitwarden
#                   iOS native app will NOT work in this mode.
tls_provider: tailscale

vaultwarden_fqdn: vaultwarden.tailnet-XXXX.ts.net

# ---------------------------------------------------------------------------
# Tailscale (only used when tls_provider == tailscale)
# ---------------------------------------------------------------------------
tailscale_authkey: "tskey-auth-REPLACE_ME"
tailscale_hostname: vaultwarden

# ---------------------------------------------------------------------------
# Vaultwarden
# ---------------------------------------------------------------------------
vaultwarden_version: "1.36.0"

# Leave "true" only long enough to create your account, then "false".
vaultwarden_signups_allowed: "true"

# /admin panel passphrase, materialised as a Docker secret. Leave empty
# to disable /admin entirely. Generate with:
#   docker run --rm vaultwarden/server hash --preset=owasp5
vaultwarden_admin_token: ""

system_timezone: UTC
force_cert_regen: False

# ---------------------------------------------------------------------------
# Backups
# ---------------------------------------------------------------------------
# All credentials below land in /etc/vault_pi_secrets/ (root:root 0600)
# and are mounted into the backup-runner container as Docker secrets.
# They never appear in process environment variables or `docker inspect`.

borg_pass: notarealpass

# rclone backend config. Paste the full [remote] block from your
# `rclone config` output (any rclone-supported backend: Dropbox, B2,
# S3, SFTP, WebDAV, Google Drive, etc.). The remote MUST be named
# [remote] — that name is hardcoded in the runner.
#
# Dropbox example (OAuth):
rclone_config: |
  [remote]
  type = dropbox
  token = {"access_token":"XXXX","token_type":"bearer","refresh_token":"YYYY","expiry":"ZZZZ"}
#
# Backblaze B2 example (cheap object storage):
# rclone_config: |
#   [remote]
#   type = b2
#   account = your-key-id
#   key = your-application-key
#
# SFTP example (point at a NAS you own):
# rclone_config: |
#   [remote]
#   type = sftp
#   host = nas.lan
#   user = backup
#   key_file = ~/.ssh/id_ed25519

# One-shot restore flags — set True for a single playbook run, then back
# to False. `rclone_restore` pulls the borg repo from cloud → local.
# `borg_restore` extracts the latest archive into /restore inside the
# backup-runner container (you'll then docker-cp it back into vw-data).
borg_restore: False
rclone_restore: False

# Telegram bot for backup completion / failure notifications.
telegram_chatid: 1234
telegram_token: 1111:AAAA

# Legacy: only used by the self-signed cert script's CN.
cert_detail: /C=IN/ST=West Bengal/L=Kolkata/O=Home, Inc./OU=Vaultwarden/CN=vaultwarden.local
