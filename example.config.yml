---

# How to create encrypted passwords for the user module
# https://docs.ansible.com/ansible/latest/reference_appendices/faq.html#how-do-i-generate-encrypted-passwords-for-the-user-module
# The custom password for the pi user is in this example "raspberry"
pi_custom_password: $6$c04cOXDbcDZ$fobZpDfUp1gOfICS9B5MNmzr9BnNL8gzjPBZnfoYLG/VCYSXFChljrMgczA9WI.TdNXIHtSCVKEJ36suDK1s4/

# base location for all application setup
base_path: /home/pi

# flag to enable/disable backup and sync
ensure_backup: True

# flag to enable/disable automatic system updates
ensure_autoupdate: True

# flag to enable/disable e-ink display
ensure_display: True

# ---------------------------------------------------------------------------
# TLS / hostname
# ---------------------------------------------------------------------------
# tls_provider:
#   tailscale    -> Tailscale-issued Let's Encrypt (REQUIRED for the
#                   official Bitwarden iOS app to work — Apple's URLSession
#                   refuses user-installed CAs in security-sensitive apps).
#   self_signed  -> Root CA + leaf. Works for browsers and most desktop
#                   clients once you install the generated ca.crt and trust
#                   it. Bitwarden iOS native app will NOT work in this mode;
#                   you'd have to use the web vault in Safari/Brave.
tls_provider: tailscale

# When tls_provider == tailscale, this must match the tailnet FQDN that
# Tailscale assigns to the Pi (e.g. vaultwarden.tailnet-1234.ts.net).
# When tls_provider == self_signed, use vaultwarden.local or whatever LAN
# hostname your clients will hit.
vaultwarden_fqdn: vaultwarden.tailnet-XXXX.ts.net

# ---------------------------------------------------------------------------
# Tailscale (only used when tls_provider == tailscale)
# ---------------------------------------------------------------------------
# Generate one-time auth key:
#   https://login.tailscale.com/admin/settings/keys
#   (Reusable: off, Ephemeral: off, 24h expiry)
# Also flip on HTTPS Certificates at:
#   https://login.tailscale.com/admin/dns
tailscale_authkey: "tskey-auth-REPLACE_ME"
tailscale_hostname: vaultwarden

# ---------------------------------------------------------------------------
# Vaultwarden
# ---------------------------------------------------------------------------
vaultwarden_version: "1.36.0"

# Open registration: leave "true" only long enough to create your account,
# then set "false" and re-run the playbook.
vaultwarden_signups_allowed: "true"

# ADMIN_TOKEN for the /admin panel. Generate with:
#   docker run --rm vaultwarden/server hash --preset=owasp5
# Empty disables /admin entirely (recommended).
vaultwarden_admin_token: ""

system_timezone: UTC
force_cert_regen: False

# ---------------------------------------------------------------------------
# Backups
# ---------------------------------------------------------------------------
borg_pass: notarealpass
borg_restore: False

rclone_type: dropbox
rclone_token: '{"access_token":"XXXX","token_type":"Bearer","refresh_token":"YYYY","expiry":"ZZZZ"}'
rclone_restore: False

telegram_chatid: 1234
telegram_token: 1111:AAAA

# Legacy: only used by the self-signed cert script's CN.
cert_detail: /C=IN/ST=West Bengal/L=Kolkata/O=Home, Inc./OU=Vaultwarden/CN=vaultwarden.local
