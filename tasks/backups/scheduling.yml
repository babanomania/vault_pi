---
# Backup orchestration: ship the runner image source to the Pi, build it,
# wire host cron to invoke it. No host-side borg / rclone / curl needed;
# everything runs inside the container with secrets mounted from
# /etc/vault_pi_secrets/.

- name: Ship backup-runner image context to the Pi
  become: true
  become_user: "{{ ansible_user }}"
  ansible.posix.synchronize:
    src: data/backup-runner/
    dest: "{{ base_path }}/containers/backup-runner/"
    delete: yes
    recursive: yes
  register: runner_src

- name: Build backup-runner image
  become: true
  become_user: "{{ ansible_user }}"
  ansible.builtin.command:
    cmd: docker compose --profile backup build backup-runner
    chdir: "{{ base_path }}/containers"
  when: runner_src is changed
  changed_when: true

- name: Ensure backup log file exists and is writable by the runner user
  ansible.builtin.file:
    path: /var/log/vault_pi_backup.log
    state: touch
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
  changed_when: false   # `touch` always marks changed, suppress

- name: Install system cron entries for backup + sync
  ansible.builtin.copy:
    dest: /etc/cron.d/vault_pi_backup
    owner: root
    group: root
    mode: '0644'
    content: |
      # Vaultwarden backup + offsite sync.
      #
      # Both commands are idempotent and self-contained — they `docker
      # compose run --rm` a fresh backup-runner container that reads its
      # credentials from /run/secrets/* and exits.
      MAILTO=""
      SHELL=/bin/bash
      PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

      # Weekly local backup — {{ backup.schedule.description }}
      {{ backup.schedule.minute }} {{ backup.schedule.hour }} * * {{ backup.schedule.weekday }} {{ ansible_user }} cd {{ base_path }}/containers && /usr/bin/docker compose --profile backup run --rm backup-runner backup >> /var/log/vault_pi_backup.log 2>&1

      # Weekly offsite sync — {{ sync.schedule.description }}
      {{ sync.schedule.minute }} {{ sync.schedule.hour }} * * {{ sync.schedule.weekday }} {{ ansible_user }} cd {{ base_path }}/containers && /usr/bin/docker compose --profile backup run --rm backup-runner sync >> /var/log/vault_pi_backup.log 2>&1

- name: Install logrotate policy for backup log
  ansible.builtin.copy:
    dest: /etc/logrotate.d/vault_pi_backup
    owner: root
    group: root
    mode: '0644'
    content: |
      /var/log/vault_pi_backup.log {
          weekly
          rotate 8
          compress
          missingok
          notifempty
          copytruncate
      }

# One-shot restore paths. Both flags should be left False after a
# successful restore, otherwise the playbook would re-pull and overwrite
# on every run.

- name: Pull borg repo from cloud (only when rclone_restore true)
  become: true
  become_user: "{{ ansible_user }}"
  ansible.builtin.command:
    cmd: docker compose --profile backup run --rm backup-runner sync-restore
    chdir: "{{ base_path }}/containers"
  when: rclone_restore | default(false)

- name: Extract latest borg archive into /restore (only when borg_restore true)
  become: true
  become_user: "{{ ansible_user }}"
  ansible.builtin.command:
    cmd: docker compose --profile backup run --rm backup-runner restore latest
    chdir: "{{ base_path }}/containers"
  when: borg_restore | default(false)
