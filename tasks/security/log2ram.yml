---
- name: Ensure /etc/apt/keyrings exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Download azlux apt signing key
  ansible.builtin.get_url:
    url: https://azlux.fr/repo.gpg
    dest: /etc/apt/keyrings/{{ apt_keyring_file }}
    mode: '0644'
    owner: root
    group: root
  register: dl_key

- name: "Add /etc/apt/sources.list.d/{{ apt_sources_file }}"
  copy:
    content: "deb [signed-by=/etc/apt/keyrings/{{ apt_keyring_file }}] http://packages.azlux.fr/debian/ {{ ansible_facts['distribution_release'] }} main\n"
    dest: /etc/apt/sources.list.d/{{ apt_sources_file }}
    mode: '0644'
    owner: root
  register: source_list

- name: Update apt cache
  apt:
    update_cache: true
  when: dl_key is changed or source_list is changed

- name: Install log2ram
  apt:
    pkg:
      - log2ram
  register: pkg
  notify: Restart log2ram

- name: Set log2ram config options
  lineinfile:
    path: /etc/log2ram.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    backrefs: true
  loop:
    - {regexp: '^SIZE=(.*)$', line: 'SIZE={{ log2ram_size }}'}
    - {regexp: '^PATH_DISK=(.*)$', line: 'PATH_DISK="{{ log2ram_path_disk }}"'}
    - {regexp: '^ZL2R=(.*)$', line: 'ZL2R={{ log2ram_use_z2lr|lower }}'}
    - {regexp: '^COMP_ALG=(.*)$', line: 'COMP_ALG={{ log2ram_comp_alg }}'}
    - {regexp: '^LOG_DISK_SIZE=(.*)$', line: 'LOG_DISK_SIZE={{ log2ram_log_disk_size }}'}
  notify: Restart log2ram
