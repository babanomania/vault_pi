---
# Materialise all credentials into root-owned files under
# /etc/vault_pi_secrets/, so docker-compose `secrets:` with `file:` source
# can mount them into containers at /run/secrets/<name>.
#
# Why root:root 0700 + 0600?
#   - Containers run their own UIDs; docker bind-mounts the secret files
#     into the container as root anyway when mounting `file:` secrets.
#   - Pi user shouldn't need direct read access — these go through
#     `docker compose run`.
#   - 0600 means a stolen SD card image still doesn't trivially expose
#     them via stray world-read perms.

- name: Ensure /etc/vault_pi_secrets directory exists
  ansible.builtin.file:
    path: /etc/vault_pi_secrets
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Write vaultwarden ADMIN_TOKEN secret (skipped when empty)
  ansible.builtin.copy:
    content: "{{ vaultwarden_admin_token }}"
    dest: /etc/vault_pi_secrets/admin_token
    owner: root
    group: root
    mode: '0600'
  when: (vaultwarden_admin_token | default('')) | length > 0
  no_log: true

- name: Remove ADMIN_TOKEN secret file when token is unset
  ansible.builtin.file:
    path: /etc/vault_pi_secrets/admin_token
    state: absent
  when: (vaultwarden_admin_token | default('')) | length == 0

# The backup-runner reads borg passphrase, rclone config, and telegram
# credentials. Only materialise them when backups are enabled — leaving
# the files absent makes the secrets: block in docker-compose.yml.j2
# conditional too, so compose validation doesn't complain about missing
# source files.

- name: Write borg passphrase secret
  ansible.builtin.copy:
    content: "{{ borg_pass }}"
    dest: /etc/vault_pi_secrets/borg_passphrase
    owner: root
    group: root
    mode: '0600'
  when: ensure_backup | default(false)
  no_log: true

- name: Render rclone.conf secret
  ansible.builtin.template:
    src: data/secrets/rclone.conf.j2
    dest: /etc/vault_pi_secrets/rclone.conf
    owner: root
    group: root
    mode: '0600'
  when: ensure_backup | default(false)
  no_log: true

- name: Write telegram bot token secret
  ansible.builtin.copy:
    content: "{{ telegram_token }}"
    dest: /etc/vault_pi_secrets/telegram_token
    owner: root
    group: root
    mode: '0600'
  when: ensure_backup | default(false)
  no_log: true

- name: Write telegram chat id secret
  ansible.builtin.copy:
    content: "{{ telegram_chatid }}"
    dest: /etc/vault_pi_secrets/telegram_chatid
    owner: root
    group: root
    mode: '0600'
  when: ensure_backup | default(false)
  no_log: true
